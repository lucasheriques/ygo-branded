<body>
<div class="app">
  <div class="hdr">
    <h1>Pure Branded — Complete 2026 Guide</h1>
    <p>Post-Burst Protocol · All cards explained · Verified effects · Click any card for full text</p>
    <div class="cd" id="countdown"></div>
  </div>
  <div class="cst">Images: <span id="cache-info">loading...</span></div>
  <div class="nav" id="main-nav"></div>
  <div id="root"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-c">
    <button class="modal-x" onclick="closeModal()">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ════════════════ IMAGE CACHE (IndexedDB) ════════════════
const DB='ygo-cache-v2',ST='imgs';let db=null,hits=0,misses=0;
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore(ST);q.onsuccess=()=>{db=q.result;r(db)};q.onerror=()=>j(q.error)})}
function cg(k){return new Promise(r=>{if(!db)return r(null);const t=db.transaction(ST,'readonly').objectStore(ST).get(k);t.onsuccess=()=>r(t.result||null);t.onerror=()=>r(null)})}
function cs(k,v){return new Promise(r=>{if(!db)return r();const t=db.transaction(ST,'readwrite');t.objectStore(ST).put(v,k);t.oncomplete=()=>r();t.onerror=()=>r()})}
function ucs(){const e=document.getElementById('cache-info');if(e)e.textContent=`${hits} cached, ${misses} fetched`}

const API='https://db.ygoprodeck.com/api/v7/cardinfo.php';

async function getImg(name){
  const k='img:'+name.toLowerCase();
  const c=await cg(k);if(c){hits++;ucs();return c}
  try{
    let r=await fetch(API+'?name='+encodeURIComponent(name));
    if(!r.ok)r=await fetch(API+'?fname='+encodeURIComponent(name));
    if(!r.ok)return null;
    const d=await r.json(),u=d.data?.[0]?.card_images?.[0]?.image_url_small;
    if(!u)return null;
    const ir=await fetch(u),bl=await ir.blob();
    const b=await new Promise(rs=>{const rd=new FileReader();rd.onload=()=>rs(rd.result);rd.readAsDataURL(bl)});
    await cs(k,b);misses++;ucs();return b;
  }catch{return null}
}

async function getData(name){
  const k='data:'+name.toLowerCase();
  const c=await cg(k);if(c)return c;
  try{
    let r=await fetch(API+'?name='+encodeURIComponent(name));
    if(!r.ok)r=await fetch(API+'?fname='+encodeURIComponent(name));
    if(!r.ok)return null;
    const d=await r.json(),card=d.data?.[0];
    if(card){await cs(k,card)}return card;
  }catch{return null}
}

// ════════════════ CARD MODAL ════════════════
async function openCard(name){
  const m=document.getElementById('modal'),b=document.getElementById('modal-body');
  b.innerHTML='<p style="color:var(--mu)">Loading card data...</p>';
  m.classList.add('show');
  const card=await getData(name);
  const img=await getImg(name);
  if(!card){b.innerHTML=`<p>Could not load data for "${name}". Try the Card Lookup tab.</p>`;return}
  const type=[card.type,card.race,card.attribute].filter(Boolean).join(' · ');
  const stats=card.atk!==undefined?`ATK ${card.atk}`+(card.def!==undefined?` / DEF ${card.def}`:''):'';
  const lvl=card.level?`Level/Rank: ${card.level}`:'';
  b.innerHTML=`
    ${img?`<img src="${img}" class="modal-img" alt="${card.name}">`:''}
    <div class="modal-name">${card.name}</div>
    <div class="modal-type">${type}</div>
    ${lvl?`<div class="modal-stats">${lvl}</div>`:''}
    ${stats?`<div class="modal-stats">${stats}</div>`:''}
    <div class="modal-desc">${card.desc||'No description available.'}</div>`;
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ════════════════ NAVIGATION ════════════════
const TABS=[['how','How It Works'],['cards','All Cards'],['combos','Combo Lines'],['handtraps','Hand Traps'],['matchups','Meta Matchups'],['prep','2-Week Prep'],['lookup','Card Lookup']];
function buildNav(){
  const n=document.getElementById('main-nav');
  TABS.forEach(([id,lbl],i)=>{const b=document.createElement('button');b.textContent=lbl;if(!i)b.classList.add('act');
    b.onclick=()=>{document.querySelectorAll('.sec').forEach(s=>s.classList.remove('act'));document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('act'));document.getElementById('sec-'+id).classList.add('act');b.classList.add('act')};n.appendChild(b)})
}

// ════════════════ CARD RENDERING ════════════════
const TM={st:'Starter',bo:'Boss',en:'Engine',pr:'Protection',ex:'Extender',nw:'New BPRO',sp:'Spell/Trap',gr:'Grind'};
function mkTags(ts){return ts.map(t=>`<span class="tg tg-${t}">${TM[t]}</span>`).join('')}

function mkCard(el,[api,display,tags,goal,why]){
  const d=document.createElement('div');d.className='ce';
  d.onclick=()=>openCard(api);
  const iid='i'+Math.random().toString(36).slice(2,8);
  d.innerHTML=`<div class="ce-img" id="${iid}"><div class="ph">${display}</div></div>
    <div class="ce-body"><div class="ce-tags">${mkTags(tags)}</div><div class="ce-name">${display}</div>
    <div class="ce-goal">${goal}</div><div class="ce-why">${why}</div></div>`;
  el.appendChild(d);
  getImg(api).then(src=>{const c=document.getElementById(iid);if(src&&c)c.innerHTML=`<img src="${src}" alt="${display}" loading="lazy">`;});
}

// ════════════════ BUILD ALL SECTIONS ════════════════
function build(){
  const R=document.getElementById('root');

  // === HOW IT WORKS ===
  R.insertAdjacentHTML('beforeend',`<div class="sec act" id="sec-how"><div class="pnl">
  <h2>The Big Picture — How Pure Branded Works in 2026</h2>
  <div class="cpt"><h4>One-Sentence Summary</h4>
  <p>You send Fusion Monsters from your Extra Deck to the GY (via Branded Fusion, Fallen of White Dragon, or Branded in High Spirits), and those Fusions trigger free effects in the GY — so the "cost" of your plays is actually pure advantage.</p></div>

  <h3>The Plus Engine</h3>
  <div class="cpt cpt-gn"><h4>Step 1 — Send from Deck/Extra Deck, not hand</h4>
  <p><b>Branded Fusion</b> sends from Main Deck. <b>Fallen of White Dragon</b> sends from Extra Deck (as cost!). <b>Branded in High Spirits</b> sends from Extra Deck. You never lose hand cards.</p></div>

  <div class="cpt cpt-gn"><h4>Step 2 — Everything you send triggers in the GY</h4>
  <p><b>Albion the Branded Dragon</b> in GY → End Phase: set a free Branded spell/trap from Deck.<br>
  <b>Titaniklad the Ash Dragon</b> in GY → End Phase: add or summon an Albaz/Dogmatika monster from Deck.<br>
  <b>Albion the Shrouded Dragon</b> in GY → sends another Branded card from Deck to GY (chain reaction).<br>
  <b>Blazing Cartesia</b> in GY → End Phase: returns to hand if a Fusion hit GY.<br>
  <b>Branded in High Spirits</b> in GY → End Phase: returns to hand if a Fusion hit GY.</p></div>

  <div class="cpt cpt-bl"><h4>Step 3 — You play on BOTH turns</h4>
  <p>Your turn: Build Mirrorjade + protection.<br>
  Opponent's turn: <b>Branded in Red</b> (free trap fusion), <b>Ecclesia and the Dark Dragon</b> (quick recruit from Deck), <b>Blazing Cartesia</b> (quick-effect fusion), <b>Mirrorjade</b> (banish their monster), <b>Mercourier</b> (negate from hand/field).</p></div>

  <div class="cpt cpt-or"><h4>Step 4 — Cards come back every End Phase</h4>
  <p>Blazing Cartesia + Branded in High Spirits both return to hand during End Phase if any Fusion was sent to GY. This means <b>you never run out of gas</b>. Every turn you have starters coming back.</p></div>

  <h3>The Two Starters</h3>
  <div class="flow">PLAN A — Branded Fusion
  Branded Fusion → Albion → Lubellion → Mirrorjade
  + Bystial Lubellion → Branded Lost
  + Albion End Phase → set Branded in Red
  Board: Mirrorjade + Branded Lost + Branded in Red

PLAN B — Fallen of White Dragon (NEW)
  Fallen of White (send Albion/Titaniklad from ED) → recruit Ecclesia
  → Synchro into Ecclesia and the Dark Dragon (L8 Synchro)
  + Albion/Titaniklad End Phase trigger
  Opponent's turn: Ecclesia recruits Cartesia/Quem → fusion plays

PLAN C — Branded in High Spirits Loop
  High Spirits → send L8 Fusion from ED to GY (triggers)
  → discard to search any Albaz-mentioning monster
  → End Phase: High Spirits returns + Fusion GY triggers
  Repeatable advantage engine every single turn

ALL THREE can operate independently. If one gets negated, pivot to another.</div>

  <h3>The Granguignol Recycling Loop</h3>
  <div class="flow">Blazing Cartesia + any LIGHT/DARK on field
  → Quick-effect Fusion: Granguignol the Dusk Dragon
  → Granguignol sends Albion the Shrouded from Deck to GY
  → Shrouded in GY sends Branded Retribution from Deck to GY
  → Banish Retribution from GY → recover Branded Fusion from GY
  → End Phase: Cartesia returns to hand
  = You got Branded Fusion + Cartesia back for next turn</div>

  <div class="cpt"><h4>Key 2026 Change: No more Despia</h4>
  <p>Modern pure Branded has moved away from Despia cards (Aluber, Comedy, Tragedy, Ad Libitum). The new BPRO support (Fallen of White, High Spirits, Shrouded x3, The Fallen & The Virtuous x3) is so good that the Despia package is no longer needed. The deck is leaner and more resilient.</p></div>
  </div></div>`);

  // === COMBOS ===
  R.insertAdjacentHTML('beforeend',`<div class="sec" id="sec-combos"><div class="pnl">

    <div class="cs"><div class="sn">4</div><div class="sc">End Phase: <b>Albion</b> GY → set Branded in Red. (Or Titaniklad → search/summon from Deck.)</div></div>

  </div>
  <div class="cpt cpt-gn"><h4>End Board</h4><p>Ecclesia Synchro (quick recruit) + Branded in Red set. During opp turn: Ecclesia fetches Cartesia → fusion into Mirrorjade. Ecclesia returns End Phase.</p></div>
  </div>

  <div class="cpnl" id="c3">
  <h3>Requires: Branded in High Spirits + a monster to reveal</h3>

    <div class="cs"><div class="sn">1</div><div class="sc"><b>Branded in High Spirits</b>: reveal monster → send L8 Fusion (Albion) from ED to GY.</div></div>

  R.insertAdjacentHTML('beforeend',`<div class="sec" id="sec-prep"><div class="pnl">

  </div></div>
  <div class="pnl"><h2>Resources</h2>
  <div class="mu-e" style="border-color:var(--bl)"><h4>Simulators</h4><p><b>Dueling Nexus</b> (browser). <b>EDOPro</b> (desktop, best rulings). <b>Master Duel</b> (different banlist, good reps).</p></div>
  <div class="mu-e" style="border-color:var(--gd)"><h4>Guides</h4><p><b>MetaGamesGX Spreadsheet</b> (180+ combos, 70+ BPRO). <b>April's Branded Study</b> (YouTube). <b>YGOPRODeck</b> (decklists).</p></div>
  </div></div>`);

  // === LOOKUP ===
  R.insertAdjacentHTML('beforeend',`<div class="sec" id="sec-lookup"><div class="pnl">
  <h2>Card Lookup</h2>
  <p style="color:var(--mu);margin-bottom:12px">Search any YGO card. Images cached in browser — after first load, never hits API again.</p>
  <div style="display:flex;gap:8px;margin-bottom:14px">
    <input type="text" id="csrch" placeholder="Card name..." style="flex:1;padding:10px 14px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.95em;outline:none" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()" style="padding:10px 20px;background:var(--ac);color:#fff;border:none;border-radius:8px;cursor:pointer">Search</button>
  </div>
  <div id="sres"></div></div></div>`);
}

function sc(id,btn){document.querySelectorAll('.cpnl').forEach(p=>p.classList.remove('act'));document.querySelectorAll('.ctabs button').forEach(b=>b.classList.remove('act'));document.getElementById(id).classList.add('act');btn.classList.add('act')}

async function doSearch(){
  const q=document.getElementById('csrch').value.trim();if(!q)return;
  const r=document.getElementById('sres');r.innerHTML='<p style="color:var(--mu)">Searching...</p>';
  try{
    const res=await fetch(API+'?fname='+encodeURIComponent(q));if(!res.ok)throw 0;
    const d=await res.json(),cards=(d.data||[]).slice(0,10);
    if(!cards.length){r.innerHTML='<p style="color:var(--mu)">No cards found.</p>';return}
    r.innerHTML='';
    for(const c of cards){
      const div=document.createElement('div');div.className='ce';div.onclick=()=>openCard(c.name);
      const src=await getImg(c.name);
      const type=[c.type,c.race,c.attribute].filter(Boolean).join(' · ');
      const stats=c.atk!==undefined?`ATK ${c.atk}`+(c.def!==undefined?` / DEF ${c.def}`:''):'';
      div.innerHTML=`<div class="ce-img">${src?`<img src="${src}">`:`<div class="ph">${c.name}</div>`}</div>
        <div class="ce-body"><div class="ce-name">${c.name}</div><div class="ce-tags" style="font-size:.8em;color:var(--mu)">${type} ${stats?'· '+stats:''}</div>
        <div class="ce-goal" style="font-size:.85em">${(c.desc||'').slice(0,200)}${(c.desc||'').length>200?'...':''}</div></div>`;
      r.appendChild(div);
    }
  }catch{r.innerHTML='<p style="color:var(--mu)">No results.</p>'}
}

// ════════════════ INIT ════════════════
async function init(){
  await odb();
  buildNav();
  build();
  function uc(){const d=new Date('2026-03-28T09:00:00')-new Date();if(d<=0){document.getElementById('countdown').textContent='REGIONALS DAY!';return}
    const days=Math.floor(d/864e5),hrs=Math.floor(d%864e5/36e5);document.getElementById('countdown').textContent=`${days}d ${hrs}h until Regionals`}
  uc();setInterval(uc,60000);
}
init();
</script>
