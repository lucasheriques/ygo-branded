<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pure Branded — 2026 Regional Guide</title>
<style>
/* Tailwind-inspired type scale: xs=0.75rem, sm=0.875rem, base=1rem, lg=1.125rem, xl=1.25rem, 2xl=1.5rem, 3xl=1.875rem */
:root{--bg:#0a0e14;--s1:#131920;--s2:#1a2230;--s3:#222d3d;--bd:#2a3545;--tx:#e2e8f0;--mu:#94a3b8;--ac:#8b5cf6;--ac2:#a78bfa;--gd:#f0b429;--rd:#ef4444;--gn:#22c55e;--bl:#3b82f6;--or:#f59e0b;--cy:#06b6d4;--pk:#ec4899;--tl:#2dd4bf}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--tx);line-height:1.625;font-size:1rem;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.app{max-width:1100px;margin:0 auto;padding:0.75rem}

/* Header */
.hdr{text-align:center;padding:1.5rem 0.75rem 1.25rem;border-bottom:1px solid var(--bd);margin-bottom:1rem}
.hdr h1{font-size:1.875rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--gd));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{color:var(--mu);margin-top:0.25rem;font-size:1rem}
.hdr .cd{margin-top:0.5rem;padding:0.375rem 0.875rem;background:var(--s1);border:1px solid var(--ac);border-radius:0.5rem;display:inline-block;color:var(--ac2);font-size:0.875rem}
.cst{text-align:center;font-size:0.75rem;color:var(--mu);margin-bottom:0.5rem}.cst span{color:var(--gn)}

/* Nav — horizontal scroll on mobile */
.nav{display:flex;gap:0.375rem;margin-bottom:1.25rem;position:sticky;top:0;background:var(--bg);padding:0.5rem 0;z-index:100;border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{padding:0.5rem 0.875rem;background:var(--s1);color:var(--mu);border:1px solid var(--bd);border-radius:0.5rem;cursor:pointer;font-size:0.875rem;font-weight:500;transition:all .15s;white-space:nowrap;flex-shrink:0}
.nav button:hover{border-color:var(--ac);color:var(--tx)}
.nav button.act{background:var(--ac);color:#fff;border-color:var(--ac)}
.sec{display:none}.sec.act{display:block}

/* Panel */
.pnl{background:var(--s1);border:1px solid var(--bd);border-radius:0.75rem;padding:1.25rem;margin-bottom:1rem}
.pnl h2{font-size:1.5rem;font-weight:700;color:var(--ac2);margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--bd)}
.pnl h3{font-size:1.125rem;font-weight:600;color:var(--gd);margin:1rem 0 0.5rem}

/* Card entry — responsive */
.ce{display:flex;gap:0.875rem;background:var(--s2);border-radius:0.625rem;padding:1rem;margin-bottom:0.75rem;align-items:flex-start;cursor:pointer;transition:background .15s}
.ce:hover{background:var(--s3)}
.ce-img{width:5.5rem;min-height:8rem;border-radius:0.375rem;flex-shrink:0;background:var(--s3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.ce-img img{width:100%;border-radius:0.375rem}
.ce-img .ph{color:var(--mu);font-size:0.75rem;text-align:center;padding:0.25rem}
.ce-body{flex:1;min-width:0}
.ce-name{font-size:1.125rem;font-weight:700;color:var(--gd);margin-bottom:0.25rem}
.ce-tags{margin-bottom:0.375rem}
.ce-goal{font-size:1rem;margin-bottom:0.375rem;line-height:1.625}.ce-goal b{color:var(--cy)}
.ce-why{font-size:0.875rem;color:var(--mu);margin-bottom:0.375rem;line-height:1.5}

/* Target box — shows what to search/set */
.targets{background:var(--s3);border-radius:0.375rem;padding:0.75rem;margin-top:0.5rem;font-size:0.875rem;border-left:2px solid var(--or);line-height:1.625}
.targets b{color:var(--or)}
.targets .t-item{display:inline-block;background:var(--s2);border:1px solid var(--bd);border-radius:0.25rem;padding:0.125rem 0.5rem;margin:0.125rem;font-size:0.875rem;color:var(--gd);cursor:pointer}
.targets .t-item:hover{border-color:var(--gd)}

/* Tags */
.tg{display:inline-block;font-size:0.75rem;padding:0.125rem 0.5rem;border-radius:0.5rem;font-weight:600;margin-right:0.25rem}
.tg-st{background:rgba(34,197,94,.12);color:var(--gn)}.tg-bo{background:rgba(239,68,68,.12);color:var(--rd)}
.tg-en{background:rgba(139,92,246,.12);color:var(--ac2)}.tg-pr{background:rgba(6,182,212,.12);color:var(--cy)}
.tg-ex{background:rgba(245,158,11,.12);color:var(--or)}.tg-nw{background:rgba(236,72,153,.12);color:var(--pk)}
.tg-sp{background:rgba(45,212,191,.12);color:var(--tl)}.tg-gr{background:rgba(59,130,246,.12);color:var(--bl)}

/* Concept boxes */
.cpt{background:var(--s2);border-left:3px solid var(--ac);border-radius:0 0.5rem 0.5rem 0;padding:1rem 1.125rem;margin:0.75rem 0;font-size:1rem}
.cpt h4{color:var(--ac2);font-size:1rem;font-weight:600;margin-bottom:0.375rem}.cpt p{font-size:1rem;line-height:1.625}
.cpt-gn{border-color:var(--gn)}.cpt-gn h4{color:var(--gn)}
.cpt-rd{border-color:var(--rd)}.cpt-rd h4{color:var(--rd)}
.cpt-bl{border-color:var(--bl)}.cpt-bl h4{color:var(--bl)}
.cpt-or{border-color:var(--or)}.cpt-or h4{color:var(--or)}

/* Flow */
.flow{background:var(--s2);border-radius:0.5rem;padding:1rem;margin:0.75rem 0;font-family:ui-monospace,'SF Mono','Cascadia Code','Segoe UI Mono',Menlo,Consolas,monospace;font-size:0.875rem;color:var(--gn);white-space:pre-wrap;line-height:1.75;overflow-x:auto}

/* Combo steps */
.cs{display:flex;align-items:flex-start;gap:0.75rem;padding:0.5rem 0;border-bottom:1px solid var(--bd)}.cs:last-child{border-bottom:none}
.sn{min-width:1.75rem;height:1.75rem;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.875rem;flex-shrink:0}
.sc{flex:1;font-size:1rem;line-height:1.625}.sc b{color:var(--gd)}.sc .nt{font-size:0.875rem;color:var(--mu);margin-top:0.25rem}
.cf{background:var(--s2);border-radius:0.5rem;padding:1rem;margin:0.5rem 0}

/* Matchup */
.mu-e{background:var(--s2);border-radius:0.625rem;padding:1rem;margin-bottom:0.75rem;border-left:4px solid var(--ac)}
.mu-e h4{font-size:1.125rem;font-weight:600;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.375rem;flex-wrap:wrap}
.badge{font-size:0.75rem;padding:0.25rem 0.625rem;border-radius:0.625rem;font-weight:700}
.b-fav{background:rgba(34,197,94,.12);color:var(--gn)}.b-ev{background:rgba(245,158,11,.12);color:var(--or)}.b-un{background:rgba(239,68,68,.12);color:var(--rd)}
.mu-ht{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:0.5rem;padding:0.75rem 1rem;margin-top:0.75rem;font-size:1rem;line-height:1.625}.mu-ht strong{color:var(--rd)}

/* Combo tabs */
.ctabs{display:flex;gap:0.25rem;margin-bottom:0.75rem;flex-wrap:wrap}
.ctabs button{padding:0.5rem 0.75rem;background:var(--s2);border:1px solid var(--bd);border-radius:0.375rem;color:var(--mu);cursor:pointer;font-size:0.875rem;font-weight:500;transition:all .15s}
.ctabs button:hover{color:var(--tx);border-color:var(--ac)}
.ctabs button.act{background:var(--ac);color:#fff;border-color:var(--ac)}
.cpnl{display:none}.cpnl.act{display:block}

/* Timeline */
.tl{position:relative;padding-left:1.5rem;margin-top:0.75rem}
.tl::before{content:'';position:absolute;left:0.5625rem;top:0;bottom:0;width:2px;background:var(--bd)}
.tl-i{position:relative;padding:0.5rem 0 1.125rem}.tl-i::before{content:'';position:absolute;left:-1.125rem;top:0.75rem;width:0.5rem;height:0.5rem;border-radius:50%;background:var(--ac);border:2px solid var(--bg)}
.tl-i .dl{color:var(--ac2);font-weight:600;font-size:1rem;margin-bottom:0.25rem}
.tl-i p{font-size:1rem;line-height:1.625}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;justify-content:center;align-items:flex-start;padding:2.5rem 1rem;overflow-y:auto}
.modal.show{display:flex}
.modal-c{background:var(--s1);border:1px solid var(--bd);border-radius:0.875rem;padding:1.75rem;max-width:48rem;width:100%;position:relative}
.modal-x{position:absolute;top:0.5rem;right:0.75rem;background:none;border:none;color:var(--mu);font-size:1.5rem;cursor:pointer;padding:0.25rem 0.5rem;z-index:1}
.modal-top{display:flex;gap:1.5rem;margin-bottom:1rem;align-items:flex-start}
.modal-img{width:16rem;border-radius:0.5rem;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.5)}
.modal-info{flex:1;min-width:0;padding-top:0.25rem}
.modal-name{font-size:1.5rem;font-weight:700;color:var(--gd);margin-bottom:0.375rem}
.modal-type{font-size:1rem;color:var(--mu);margin-bottom:0.5rem}
.modal-stats{font-size:1rem;color:var(--ac2);margin-bottom:0.375rem}
.modal-desc{font-size:1rem;line-height:1.75}

/* Mobile */
@media(max-width:640px){
  .hdr h1{font-size:1.5rem}
  .pnl{padding:1rem}
  .pnl h2{font-size:1.25rem}
  .ce{padding:0.75rem;gap:0.625rem}
  .ce-img{width:4.5rem;min-height:6.5rem}
  .ce-name{font-size:1rem}
  .ce-goal,.ce-why,.targets,.sc,.cpt,.cpt p,.mu-ht,.tl-i p,.tl-i .dl,.modal-desc{font-size:0.875rem}
  .modal-top{flex-direction:column;align-items:center;text-align:center}
  .modal-img{width:14rem}
  .modal-c{padding:1.125rem;max-width:95vw}
  .modal-name{font-size:1.25rem}
  .flow{font-size:0.8125rem;padding:0.75rem}
  .cf{padding:0.75rem}
  .cs{gap:0.5rem}
}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>Pure Branded — 2026 Regional Guide</h1>
    <p>Post-Burst Protocol · Click any card for full effect text</p>
    <div class="cd" id="countdown"></div>
  </div>
  <div class="cst">Images: <span id="cache-info">loading...</span></div>
  <div class="nav" id="main-nav"></div>
  <div id="root"></div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-c">
    <button class="modal-x" onclick="closeModal()">&times;</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ══════════ Image & Data Strategy ══════════
// Images: local /images/{slug}.jpg first, onerror → YGOPRODeck API
// Card data: IndexedDB cache → API fallback

const DB='ygo-v5',ST='d';let db=null,hits=0,misses=0,localImgs=0;
function odb(){return new Promise(r=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore(ST);q.onsuccess=()=>{db=q.result;r()};q.onerror=()=>{r()}})}
function cg(k){return new Promise(r=>{if(!db)return r(null);try{const t=db.transaction(ST,'readonly').objectStore(ST).get(k);t.onsuccess=()=>r(t.result||null);t.onerror=()=>r(null)}catch(e){r(null)}})}
function cp(k,v){try{if(!db)return;const t=db.transaction(ST,'readwrite');t.objectStore(ST).put(v,k)}catch(e){}}
function ucs(){const e=document.getElementById('cache-info');if(e)e.textContent=`${localImgs} local · ${hits} cached · ${misses} fetched`}
const API='https://db.ygoprodeck.com/api/v7/cardinfo.php';

// Slug: same logic as Python script
function slugify(name){return name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'')}

// Get local image path for a card
function localImgPath(name){return'images/'+slugify(name)+'.jpg'}

// Fetch queue — max 4 concurrent, 200ms between
const fetchQ=[];let activeF=0;
function enqueueF(fn){return new Promise((res,rej)=>{fetchQ.push(()=>fn().then(res,rej));drainQ()})}
function drainQ(){while(activeF<4&&fetchQ.length){activeF++;const fn=fetchQ.shift();fn().finally(()=>{activeF--;setTimeout(drainQ,200)})}}

async function fetchCard(name){
  const k='c:'+name.toLowerCase();
  const cached=await cg(k);
  if(cached){hits++;ucs();return cached}
  return enqueueF(async()=>{
    const c2=await cg(k);if(c2){hits++;ucs();return c2}
    try{
      let r=await fetch(API+'?name='+encodeURIComponent(name));
      if(!r.ok)r=await fetch(API+'?fname='+encodeURIComponent(name));
      if(!r.ok)return null;
      const d=await r.json(),card=d.data?.[0];
      if(card){cp(k,card);misses++;ucs()}
      return card||null;
    }catch(e){console.warn('API fetch failed for',name,e);return null}
  });
}

// For modal — get card data
async function getData(name){return fetchCard(name)}

// Load image into element: try local first, then API fallback
function loadCardImg(imgEl,name){
  const local=localImgPath(name);
  imgEl.src=local;
  imgEl.onerror=async function(){
    this.onerror=null;
    const card=await fetchCard(name);
    const url=card?.card_images?.[0]?.image_url||card?.card_images?.[0]?.image_url_small;
    if(url){this.src=url}else{this.parentElement.innerHTML=`<div class="ph">${name}</div>`}
  };
  imgEl.onload=function(){
    if(this.src.includes('images/'))localImgs++;
    ucs();
  };
}

// ══════════ Modal ══════════
async function openCard(name){
  const m=document.getElementById('modal'),b=document.getElementById('modal-body');
  b.innerHTML='<p style="color:var(--mu)">Loading...</p>';m.classList.add('show');
  document.body.style.overflow='hidden';
  const card=await getData(name);
  if(!card){
    // Still show local image if available
    const localSrc=localImgPath(name);
    b.innerHTML=`<div class="modal-top"><img src="${localSrc}" class="modal-img" onerror="this.style.display='none'">
    <div class="modal-info"><div class="modal-name">${name}</div>
    <div class="modal-type">Card data unavailable (API may be rate-limited)</div></div></div>`;return}
  const imgLocal=localImgPath(name);
  const imgApi=card?.card_images?.[0]?.image_url||card?.card_images?.[0]?.image_url_small||'';
  const type=[card.type,card.race,card.attribute].filter(Boolean).join(' · ');
  const stats=card.atk!=null?`ATK ${card.atk}`+(card.def!=null?` / DEF ${card.def}`:''):'';
  const lvl=card.level?`Level ${card.level}`:'';
  b.innerHTML=`<div class="modal-top">
    <img id="modal-card-img" src="${imgLocal}" class="modal-img">
    <div class="modal-info"><div class="modal-name">${card.name}</div>
    <div class="modal-type">${type}</div>
    ${lvl?`<div class="modal-stats">${lvl}</div>`:''}
    ${stats?`<div class="modal-stats">${stats}</div>`:''}</div></div>
    <div class="modal-desc">${card.desc||''}</div>`;
  // Fallback for modal image
  const mi=document.getElementById('modal-card-img');
  if(mi){mi.onerror=function(){if(imgApi){this.onerror=null;this.src=imgApi}else{this.style.display='none'}}}
}
function closeModal(){document.getElementById('modal').classList.remove('show');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ══════════ Nav ══════════
const TABS=[['how','How It Works'],['cards','All Cards'],['combos','Combos'],['ht','Hand Traps'],['mu','Matchups'],['prep','2-Week Prep'],['look','Lookup']];
function buildNav(){
  const n=document.getElementById('main-nav');
  TABS.forEach(([id,lbl],i)=>{const b=document.createElement('button');b.textContent=lbl;if(!i)b.classList.add('act');
    b.onclick=()=>{document.querySelectorAll('.sec').forEach(s=>s.classList.remove('act'));
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('act'));
    document.getElementById('sec-'+id).classList.add('act');b.classList.add('act');window.scrollTo(0,0)};n.appendChild(b)})
}

// ══════════ Card Data ══════════
const TM={st:'Starter',bo:'Boss',en:'Engine',pr:'Protection',ex:'Extender',nw:'BPRO',sp:'Spell/Trap',gr:'Grind'};
function mkT(ts){return ts.map(t=>`<span class="tg tg-${t}">${TM[t]}</span>`).join('')}

// target items → clickable card names
function mkTargets(label,items){
  if(!items||!items.length)return'';
  return`<div class="targets"><b>${label}:</b> ${items.map(([name,why])=>`<span class="t-item" onclick="event.stopPropagation();openCard('${name}')">${name}</span> <span style="color:var(--mu)">${why}</span> `).join('')}</div>`;
}

// [apiName, display, tags[], goal, why, targets:{label,items[[name,why]]}]
const C={
core:[

    '<b>Goal:</b> Normal Spell. Fusion Summon sending materials from <b>Deck</b>. You lose nothing from hand — the cornerstone of every Branded combo.',

    null],

  ['Fallen of the White Dragon','Fallen of the White Dragon',['st','nw'],
    '<b>Goal:</b> Self-summon from hand by sending an "Albaz" Fusion from ED to GY (COST — can\'t be negated). On summon: recruit any "Ecclesia" from hand/Deck/GY.',

    {label:'Usual ED sends (and why)',items:[['Albion the Branded Dragon','— best default. His GY End Phase effect sets Branded in Red for free, giving you a Fusion Summon on opponent\'s turn.'],['Titaniklad the Ash Dragon','— if you already have Branded in Red or need bodies. His End Phase adds/summons Cartesia or Quem from Deck, giving you a monster for next turn.']]}],

  ['Albion the Shrouded Dragon','Albion the Shrouded Dragon',['st','en'],
    '<b>Goal:</b> From hand/GY: send "Fallen of Albaz" or "Branded" spell/trap from hand or Deck to GY → hand: Special Summon Shrouded. Deck: Shrouded goes to bottom, draw 1. Treated as "Fallen of Albaz" on field/GY.',
    'Sending Branded cards from Deck sets up GY plays. Run 3.',
    {label:'Usual Deck sends (and why)',items:[['Branded Retribution','— #1 choice. Once in GY, banish it to recover Branded Fusion from GY. Gives you BF for next turn.'],['Branded in Red','— if you need it in GY for Retribution\'s recovery effect (banish Retribution → add Red from GY to hand).'],['Fallen of Albaz','— if you need the "Albaz" name in GY so Blazing Cartesia can self-summon.']]}],

  ['Blazing Cartesia, the Virtuous','Blazing Cartesia, the Virtuous',['st','pr'],
    '<b>Goal:</b> Self-summon from hand if Albaz on field/GY. Quick-Effect Fusion L8+ using hand/field. End Phase: returns to hand if a Fusion was sent to GY.',
    'Starter + interaction. Dodges targeting by chaining fusion. Returns every End Phase. Run 2.',
    {label:'Usual fusion targets (and why)',items:[['Granguignol the Dusk Dragon','— default on your turn. Granguignol sends Albion Shrouded from Deck to GY, starting the Retribution recycle loop (→ recover Branded Fusion for next turn).'],['Mirrorjade the Iceblade Dragon','— if you have Albaz + DARK in GY/banished. Makes your boss monster during opponent\'s turn via Ecclesia\'s recruit.'],['Albion the Sanctifire Dragon','— untargetable body. Quick Effect summons from GY to both fields. Niche but hard to remove.']]}],

  ['Branded in High Spirits','Branded in High Spirits',['st','sp','nw'],
    '<b>Goal:</b> Quick-Play. Reveal monster → send L8 Fusion with same Type + 2500 ATK/DEF from ED to GY. Optionally discard revealed → search Albaz-mentioning monster. End Phase: returns to hand if Fusion hit GY.',

    {label:'Usual ED sends (and why)',items:[['Albion the Branded Dragon','— default. Triggers End Phase set (free Branded in Red). Best value.'],['Titaniklad the Ash Dragon','— if you need a body next turn. Titan searches/summons Cartesia or Quem.']],
     label2:'Usual searches (and why)',items2:[['Blazing Cartesia, the Virtuous','— #1 target. Self-summons, quick-effect fuses, and returns to hand every EP. Best all-rounder.'],['Fallen of the White Dragon','— if you don\'t have a second starter yet. Opens the Ecclesia Synchro line.'],['Albion the Shrouded Dragon','— if you need him as an Albaz name on field or want his GY send effect later.']]}],

// ══════════ Render ══════════
function mkCard(el,c){
  const[api,display,tags,goal,why,tgt]=c;
  const d=document.createElement('div');d.className='ce';
  d.onclick=()=>openCard(api);
  const iid='i'+Math.random().toString(36).slice(2,8);

  let tgtHtml='';
  if(tgt){
    tgtHtml+=mkTargets(tgt.label,tgt.items);
    if(tgt.label2)tgtHtml+=mkTargets(tgt.label2,tgt.items2);
  }

  d.innerHTML=`<div class="ce-img"><div class="ph">${display}</div></div>
    <div class="ce-body"><div class="ce-tags">${mkT(tags)}</div><div class="ce-name">${display}</div>
    <div class="ce-goal">${goal}</div><div class="ce-why">${why}</div>${tgtHtml}</div>`;
  el.appendChild(d);
  // Load image: local first → API fallback (use querySelector, not getElementById — element may not be in DOM yet)
  const imgContainer=d.querySelector('.ce-img');
  if(imgContainer){const img=document.createElement('img');img.loading='lazy';img.alt=display;loadCardImg(img,api);imgContainer.innerHTML='';imgContainer.appendChild(img)}
}

function addGroup(title,desc,cards,parent){
  const p=document.createElement('div');p.className='pnl';
  p.innerHTML=`<h2>${title}</h2><p style="color:var(--mu);margin-bottom:10px;font-size:.88em">${desc}</p>`;
  cards.forEach(c=>mkCard(p,c));parent.appendChild(p);
}

  defs.forEach(([name,badge,label,desc,key,ht])=>{
    const p=document.createElement('div');p.className='pnl';
    p.innerHTML=`<div class="mu-e"><h4>${name} <span class="badge ${badge}">${label}</span></h4>

async function doSearch(){
  const q=document.getElementById('csrch').value.trim();if(!q)return;
  const r=document.getElementById('sres');r.innerHTML='<p style="color:var(--mu)">Searching...</p>';
  try{
    const res=await fetch(API+'?fname='+encodeURIComponent(q));if(!res.ok)throw 0;
    const d=await res.json(),cards=(d.data||[]).slice(0,8);
    if(!cards.length){r.innerHTML='<p style="color:var(--mu)">No cards found.</p>';return}
    r.innerHTML='';
    for(const c of cards){
      // Cache each card
      cp('c:'+c.name.toLowerCase(),c);
      const div=document.createElement('div');div.className='ce';div.onclick=()=>openCard(c.name);
      const imgApi=c?.card_images?.[0]?.image_url||c?.card_images?.[0]?.image_url_small||'';
      const imgLocal=localImgPath(c.name);
      const type=[c.type,c.race,c.attribute].filter(Boolean).join(' · ');
      const stats=c.atk!=null?`ATK ${c.atk}`+(c.def!=null?` / DEF ${c.def}`:''):'';
      div.innerHTML=`<div class="ce-img"><img src="${imgLocal}" loading="lazy" onerror="if('${imgApi}'){this.onerror=null;this.src='${imgApi}'}else{this.parentElement.innerHTML='<div class=ph>${c.name}</div>'}"></div>
        <div class="ce-body"><div class="ce-name">${c.name}</div>
        <div style="font-size:.85em;color:var(--mu)">${type} ${stats?'· '+stats:''}</div>
        <div style="font-size:.88em;margin-top:4px;line-height:1.5">${(c.desc||'').slice(0,180)}${(c.desc||'').length>180?'...':''}</div></div>`;
      r.appendChild(div);
    }
  }catch{r.innerHTML='<p style="color:var(--mu)">No results.</p>'}
}
